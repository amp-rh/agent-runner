name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT || 'claude-connectors' }}
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || 'agent-runner-mcp' }}
  AR_REPO: ${{ vars.AR_REPO || 'agent-runner' }}
  IMAGE_NAME: agent-runner

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE_REF="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE_REF" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --update-env-vars="GCP_PROJECT=$GCP_PROJECT" \
            --update-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OAUTH_CLIENT_CREDENTIALS=oauth-client-credentials:latest,OAUTH_SIGNING_KEY=oauth-signing-key:latest \
            --memory=512Mi \
            --cpu=1 \
            --timeout=600 \
            --concurrency=10 \
            --cpu-throttling \
            --min-instances=0 \
            --max-instances=1 \
            --allow-unauthenticated \
            --port=8080

      - name: Configure PUBLIC_URL
        id: url
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT" \
            --format='value(status.url)')
          gcloud run services update "$SERVICE_NAME" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT" \
            --update-env-vars="PUBLIC_URL=$SERVICE_URL"
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "${{ steps.url.outputs.service_url }}/.well-known/agent.json" \
            --max-time 30 --retry 3 --retry-delay 5)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Health check failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP 200)"

      - name: Clean up old images
        run: |
          IMAGE_PATH="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}"
          gcloud artifacts docker images list "$IMAGE_PATH" \
            --include-tags --format='get(version)' --filter='NOT tags:latest' \
          | while read -r DIGEST; do
            [ -z "$DIGEST" ] && continue
            echo "Deleting $IMAGE_PATH@$DIGEST"
            gcloud artifacts docker images delete "$IMAGE_PATH@$DIGEST" --quiet --delete-tags 2>/dev/null || true
          done
