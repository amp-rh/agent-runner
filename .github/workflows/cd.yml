name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT || 'claude-connectors' }}
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || 'gcp-claude-bridge-mcp' }}
  AR_REPO: ${{ vars.AR_REPO || 'agent-runner' }}
  IMAGE_NAME: gcp-claude-bridge-mcp
  COMMON_SECRETS: "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OAUTH_CLIENT_CREDENTIALS=oauth-client-credentials:latest,OAUTH_SIGNING_KEY=oauth-signing-key:latest"

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure gcloud defaults
        run: |
          gcloud config set project "$GCP_PROJECT"
          gcloud config set run/region "$GCP_REGION"
          gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image ref
        run: echo "IMAGE_REF=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          SERVICE_URL=$(gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE_REF" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --update-env-vars="GCP_PROJECT=$GCP_PROJECT" \
            --update-secrets="$COMMON_SECRETS" \
            --timeout=600 \
            --concurrency=10 \
            --max-instances=1 \
            --allow-unauthenticated \
            --format='value(status.url)')
          gcloud run services update "$SERVICE_NAME" \
            --update-env-vars="PUBLIC_URL=$SERVICE_URL"
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          curl -sf \
            "${{ steps.deploy.outputs.service_url }}/.well-known/agent.json" \
            --max-time 30 --retry 5 --retry-delay 5 --retry-all-errors

      - name: Clean up old images
        run: |
          IMAGE_PATH="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}"
          gcloud artifacts docker images list "$IMAGE_PATH" \
            --include-tags --format='get(version)' --filter='NOT tags:latest' \
          | while read -r DIGEST; do
            [ -z "$DIGEST" ] && continue
            gcloud artifacts docker images delete "$IMAGE_PATH@$DIGEST" --quiet --delete-tags 2>/dev/null || true
          done
