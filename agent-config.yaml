agent:
  name: "gcloud-operator"
  description: "GCP operations agent"
  model: "claude-sonnet-4-6"
  max_turns: 50
  timeout: 300
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Grep

a2a:
  enabled: true
  skills:
    - id: "run_task"
      name: "Execute agent task"
      description: "Run a task using this agent"
      tags: ["general"]

server:
  host: "0.0.0.0"
  port: 8080
  public_url: "http://localhost:8080"

hooks:
  reflection:
    enabled: true
    firestore_project: "claude-connectors"
    firestore_database: "agents"
    collection: "session_learnings"
  audit:
    enabled: true

gcp:
  project: "claude-connectors"
  region: "us-central1"
